<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acrewire</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; max-width: 1020px; margin: 14px auto; padding: 0 10px; }

    /* Drudge-ish title block */
    header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
    .masthead { display: flex; flex-direction: column; gap: 2px; }
    .brand {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1;
    }
    .brand-sub {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #444;
    }
    .updated { font-size: 12px; color: #555; white-space: nowrap; }

    /* Top links strip */
    .topstrip {
      border-top: 2px solid #111;
      border-bottom: 1px solid #111;
      padding: 8px 0;
      margin: 6px 0 12px;
    }
    .topstrip .item { margin: 4px 0; }

    /* Columns + divider lines */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;                 /* no gap so dividers look clean */
      border-top: 1px solid #ccc;
    }
    .col {
      min-width: 0;
      padding: 0 12px 12px;
    }
    .col + .col {
      border-left: 1px solid #ccc;  /* vertical divider between columns */
    }

    h2 { margin: 12px 0 6px; font-size: 12px; letter-spacing: 1px; }

    .item { margin: 6px 0; line-height: 1.15; }

    /* Drudge-like link feel: bold + underline by default */
    a { color: #000; font-weight: 700; text-decoration: underline; }
    a:hover { text-decoration: underline; }

    .red { color: red; } /* keep bold/underline from default a */
    .bold { font-weight: 900; }

    .meta { font-size: 11px; color: #666; }
    .tag { margin-right: 4px; }
    .error { color: red; white-space: pre-wrap; font-size: 13px; }

    @media (max-width: 900px) {
      header { flex-direction: column; align-items: flex-start; }
      .grid { grid-template-columns: 1fr; gap: 0; }
      .col { padding: 0 0 12px; }
      .col + .col { border-left: none; border-top: 1px solid #ccc; padding-top: 12px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="masthead">
      <div class="brand">ACREWIRE</div>
      <div class="brand-sub">AG NEWS • MARKETS • WATER • POLICY</div>
    </div>
    <div class="updated" id="updated"></div>
  </header>

  <!-- Top 3–5 links go here -->
  <div class="topstrip">
    <div id="toplinks"></div>
  </div>

  <div id="status" class="meta">Loading…</div>
  <div id="content" class="grid" style="display:none;"></div>

  <script>
    // 1) Google Sheet CSV URL:
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-3xml3CAOrMcVTmr4tkQ5R1gjsnxd2fuRh2u8I0ucXHLdcjMHzs43Jxmu-mcGXGv6qTMA6mar_7Qm/pub?output=csv";

    // 2) Sections
    const SECTIONS = [
      "Almonds","Pistachios","Walnuts",
      "Citrus","Avocados","Table Grapes",
      "Wine Grapes","Raisins","Prunes",
      "Blueberries","Cherries","Apples",
      "Hazelnuts","Row Crops","Land",
      "Water","Policy"
    ];

    // 3) 3-column layout mapping
    const COLUMNS = [
      ["Almonds","Pistachios","Walnuts","Citrus","Avocados","Row Crops"],
      ["Table Grapes","Wine Grapes","Raisins","Prunes","Blueberries","Cherries","Apples"],
      ["Hazelnuts","Land","Water","Policy"]
    ];

    // Timestamp
    document.getElementById("updated").textContent =
      "Updated: " + new Date().toLocaleString("en-US", { timeZone: "America/Los_Angeles" }) + " PT";

    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");
    const topLinksEl = document.getElementById("toplinks");

    main().catch(err => {
      statusEl.className = "error";
      statusEl.textContent = "ERROR: " + (err && err.message ? err.message : String(err));
      console.error(err);
    });

    async function main() {
      // Cache-bust so edits appear quickly
      const url = SHEET_CSV_URL + (SHEET_CSV_URL.includes("?") ? "&" : "?") + "v=" + Date.now();

      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("Could not load Sheet CSV (HTTP " + res.status + "). Make sure it's published as CSV.");

      const csvText = await res.text();
      const rows = parseCSV(csvText);
      if (rows.length < 2) throw new Error("Sheet appears empty. Add rows under the header.");

      const headers = rows[0].map(h => (h || "").trim().toLowerCase());
      const idx = Object.fromEntries(headers.map((h, i) => [h, i]));

      // Expect: section,rank,headline,url,source,tag,style,active
      const items = rows.slice(1)
        .map(r => ({
          section: pick(r, idx, "section"),
          rank: Number(pick(r, idx, "rank")),
          headline: pick(r, idx, "headline"),
          url: pick(r, idx, "url"),
          source: pick(r, idx, "source"),
          tag: pick(r, idx, "tag"),
          style: (pick(r, idx, "style") || "normal").toLowerCase(),
          active: (pick(r, idx, "active") || "").toUpperCase() === "TRUE"
        }))
        .filter(x => x.active && x.section && x.headline && x.url && Number.isFinite(x.rank));

      // Group by section and sort by rank
      const bySection = {};
      for (const s of SECTIONS) bySection[s] = [];
      for (const it of items) {
        const matched = SECTIONS.find(s => s.toLowerCase() === it.section.toLowerCase());
        if (matched) bySection[matched].push(it);
      }
      for (const s of SECTIONS) bySection[s].sort((a,b) => a.rank - b.rank);

      // Topstrip: first 3–5 from "Policy"?? (Better: dedicated section named "Top")
      // We'll use a section called "Top" if present; otherwise take top ranked from Water+Policy+Land+Almonds.
      const topCandidates = [];
      if (bySection["Policy"]) topCandidates.push(...bySection["Policy"]);
      if (bySection["Water"]) topCandidates.push(...bySection["Water"]);
      if (bySection["Land"]) topCandidates.push(...bySection["Land"]);
      if (bySection["Almonds"]) topCandidates.push(...bySection["Almonds"]);

      // Sort candidates by rank, then pick up to 5
      topCandidates.sort((a,b) => a.rank - b.rank);
      const topList = topCandidates.slice(0, 5);

      topLinksEl.innerHTML = topList.length
        ? topList.map(item => `
            <div class="item">
              <a class="${item.style === "red" ? "red" : (item.style === "bold" ? "bold" : "")}"
                 href="${escapeAttr(item.url)}" target="_blank" rel="noreferrer">
                 ${escapeHtml(item.headline)}
              </a>
              <span class="meta"> ${item.source ? "— " + escapeHtml(item.source) : ""}</span>
            </div>
          `).join("")
        : `<div class="meta">—</div>`;

      // Render 3 columns with divider lines
      contentEl.innerHTML = "";
      for (const colSections of COLUMNS) {
        const col = document.createElement("div");
        col.className = "col";
        for (const sectionName of colSections) {
          const list = bySection[sectionName] || [];
          const sec = document.createElement("section");
          sec.innerHTML = `<h2>${sectionName.toUpperCase()}</h2>` +
            (list.length ? list.map(renderItem).join("") : `<div class="meta">—</div>`);
          col.appendChild(sec);
        }
        contentEl.appendChild(col);
      }

      statusEl.textContent = "";
      contentEl.style.display = "grid";
    }

    function renderItem(item) {
      const cls = item.style === "red" ? "red" : (item.style === "bold" ? "bold" : "");
      const tag = item.tag ? `<span class="tag">[${escapeHtml(item.tag)}]</span>` : "";
      const source = item.source ? `— ${escapeHtml(item.source)}` : "";
      return `
        <div class="item">
          <a class="${cls}" href="${escapeAttr(item.url)}" target="_blank" rel="noreferrer">${escapeHtml(item.headline)}</a>
          <span class="meta"> ${tag}${source}</span>
        </div>
      `;
    }

    function pick(r, idx, key) {
      const i = idx[key];
      return (i === undefined ? "" : (r[i] || "")).trim();
    }

    // CSV parser that supports quoted fields and commas/newlines inside quotes
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (c === '"' && next === '"') { cur += '"'; i++; }
          else if (c === '"') { inQuotes = false; }
          else { cur += c; }
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ",") { row.push(cur); cur = ""; }
          else if (c === "\n") { row.push(cur); rows.push(row); row = []; cur = ""; }
          else if (c !== "\r") { cur += c; }
        }
      }
      row.push(cur); rows.push(row);
      return rows.filter(r => r.some(x => (x || "").trim() !== ""));
    }

    function escapeHtml(s) {
      return (s || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }
    function escapeAttr(s) {
      return escapeHtml(s).replaceAll(" ", "%20");
    }
  </script>
</body>
</html>
