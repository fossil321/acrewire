<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AcreWire</title>

<style>

/* (ALL YOUR ORIGINAL CSS — unchanged) */

body{
  font-family: Arial, Helvetica, sans-serif;
  max-width:1800px;
  margin:10px auto;
  padding:0 20px;
  background:#fff;
  color:#000;
}

/* HEADER */

header{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
  text-align:center;
}

.masthead{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ACREWIRE TITLE */

.brand{
  font-size:56px;
  font-weight:900;
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:6px;
  background:linear-gradient(90deg,#1f4e2c,#3b7a3b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SUBTITLE */

.tagline{
  font-size:15px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:14px;
  color:#555;
  font-weight:700;
}

.tagline::before,
.tagline::after{
  content:"";
  display:inline-block;
  width:35px;
  height:2px;
  background:#3b7a3b;
  margin:0 10px;
  vertical-align:middle;
}

/* TOP STORY */

.top-story{
  width:100%;
  text-align:center;
  margin:12px 0 44px 0;
  min-height:28px;
}

.top-story a{
  text-decoration:underline;
}

.top-story a,
.top-story span{
  font-size:38px;
  font-weight:900;
  color:#000;
  line-height:1.08;
  letter-spacing:-0.4px;
  overflow-wrap:break-word;
  display:inline-block;
  max-width:1100px;
}

.top-story a:hover{
  text-decoration:underline;
}

.top-story .story-image{
  width:100%;
  max-width:calc((100% / 3) * 1.3);
  height:auto;
  display:block;
  margin:0 auto 14px auto;
  border-radius:4px;
}

.top-story .top-links{
  list-style:none;
  padding:0;
  margin:18px auto 0 auto;
  max-width:1100px;
}

.top-story .top-links li{
  margin:10px 0 0 0;
  line-height:1.25;
}

.top-story .top-links a{
  font-size:22px;
  font-weight:800;
  max-width:1100px;
  display:inline-block;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:0;
  width:100%;
}

.column{
  border-right:1px solid #ccc;
  padding:0 18px;
  box-sizing:border-box;
}

.column:last-child{
  border-right:none;
}

.section{
  margin-bottom:20px;
}

/* CATEGORY HEADINGS */

.section-title{
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
  padding-bottom:4px;
  color:#1f4e2c;
  border-bottom:2px solid #3b7a3b;
  letter-spacing:1px;
}

.section-title:hover{
  color:#2e6a38;
}

.section ul{
  list-style:none;
  padding:0;
  margin:0;
}

/* LINKS */

.section li{
  margin:0 0 10px 0;
  line-height:1.28;
  font-size:14px;
  font-weight:700;
  overflow-wrap:break-word;
}

.section a{
  color:#000;
  text-decoration:none;
}

.section a:hover{
  text-decoration:underline;
}

/* STORY IMAGE */

.story-image{
  display:block;
  max-width:100%;
  width:100%;
  height:auto;
  margin:0 0 8px 0;
  border-radius:4px;
  object-fit:cover;
}

/* LOADING */

.loading{
  font-size:16px;
  color:#666;
}

.error{
  color:#b00020;
  font-weight:700;
  text-align:center;
  margin-top:20px;
}

/* AD BOX */

.ad-box{
  margin-top:40px;
  padding:18px;
  border:2px solid #3b7a3b;
  border-radius:6px;
  text-align:center;
  background:#f7faf7;
  font-size:15px;
}

.ad-box strong{
  display:block;
  font-size:16px;
  margin-bottom:6px;
}

.ad-box a{
  color:#1f4e2c;
  font-weight:700;
  text-decoration:none;
}

.ad-box a:hover{
  text-decoration:underline;
}

/* FOOTER */

.footer{
  margin-top:20px;
  padding-top:10px;
  text-align:center;
  font-size:14px;
  color:#555;
}

.footer a{
  color:#1f4e2c;
  font-weight:700;
  text-decoration:none;
}

.footer a:hover{
  text-decoration:underline;
}

</style>
</head>
<body>

<header>
  <div class="masthead">
    <div class="brand">ACREWIRE</div>
    <div class="tagline">
      Land Agriculture Energy Markets
    </div>
  </div>
</header>

<div id="top-story" class="top-story"></div>

<div id="content" class="grid">
  <div class="loading">Loading...</div>
</div>

<div class="ad-box">
  <strong>Advertise with AcreWire</strong>
  Reach a targeted audience in agriculture, land, and real asset markets.  
  Contact: <a href="mailto:acrewire1@gmail.com">acrewire1@gmail.com</a>
</div>

<div class="footer">
  Media & Advertising Inquiries: 
  <a href="mailto:acrewire1@gmail.com">acrewire1@gmail.com</a>
</div>

<script>

const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-3xml3CAOrMcVTmr4tkQ5R1gjsnxd2fuRh2u8I0ucXHLdcjMHzs43Jxmu-mcGXGv6qTMA6mar_7Qm/pub?output=csv";

const categories = [
  "Top",
  "Row Crops",
  "Permanent Crops",
  "Global Agriculture",
  "Ag Policy",
  "Ag Technology",
  "Fertilizer & Chemicals",
  "Farmland",
  "Water",
  "Commodities",
  "Markets",
  "Residential Real Estate",
  "Commercial Real Estate",
  "Land & Development",
  "Energy",
  "Renewable Energy",
  "Infrastructure",
  "Real Asset Investing"
];

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i + 1];

    if(char === '"'){
      if(inQuotes && next === '"'){
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(char === "," && !inQuotes){
      row.push(cell);
      cell = "";
    } else if((char === "\n" || char === "\r") && !inQuotes){
      if(char === "\r" && next === "\n") i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }

  if(cell.length > 0 || row.length > 0){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function cleanText(value){
  return String(value || "")
    .replace(/^\uFEFF/, "")
    .replace(/\u00A0/g, " ")
    .trim();
}

function csvToObjects(csvText){

  const rows = parseCSV(csvText).filter(r => r.some(cell => cleanText(cell) !== ""));
  if(!rows.length) return [];

  const items = [];

  for(let i = 1; i < rows.length; i++){
    const row = rows[i];

    if(!row || row.length < 4) continue;

    items.push({
      section: row[0] ? cleanText(row[0]) : "",
      rank: row[1] ? cleanText(row[1]) : "",
      headline: row[2] ? cleanText(row[2]) : "",
      url: row[3] ? cleanText(row[3]) : "",
      image: row[4] ? cleanText(row[4]) : ""
    });
  }

  return items;
}

function sortByRank(items){
  return [...items].sort((a,b)=>Number(a.rank)-Number(b.rank));
}

function renderTopStory(items){

  const topItems = items
    .filter(x=>x.section==="Top")
    .sort((a,b)=>Number(a.rank)-Number(b.rank));

  if(!topItems.length) return;

  const top = topItems[0];
  const el = document.getElementById("top-story");

  let html = "";

  if(top.image){
    html += `<img src="${top.image}" alt="${top.headline}" class="story-image">`;
  }

  html += `<a href="${top.url}" target="_blank" rel="noopener noreferrer">${top.headline}</a>`;

  if(topItems.length > 1){
    html += `<ul class="top-links">`;

    for(let i = 1; i < topItems.length; i++){
      const item = topItems[i];
      html += `<li><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.headline}</a></li>`;
    }

    html += `</ul>`;
  }

  el.innerHTML = html;
}

function buildSectionHTML(title,items){

  const sectionItems = sortByRank(items.filter(x=>x.section===title));

  let html = `
  <div class="section">
  <div class="section-title">${title}</div>
  <ul>
  `;

  for(let item of sectionItems){

    html += `<li>`;

    if(item.image){
      html += `<img src="${item.image}" alt="${item.headline}" class="story-image">`;
    }

    html += `<a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.headline}</a></li>`;
  }

  html += `
  </ul>
  </div>
  `;

  return html;
}

function chunkIntoColumns(arr,num){
  const cols = Array.from({length:num},()=>[]);
  arr.forEach((item,i)=>cols[i%num].push(item));
  return cols;
}

function renderPage(items){

  renderTopStory(items);

  const sections = categories.filter(x=>x!=="Top");

  const columns = chunkIntoColumns(sections,3);

  const content = document.getElementById("content");

  content.innerHTML = "";

  columns.forEach(group=>{
    const col = document.createElement("div");
    col.className = "column";
    col.innerHTML = group.map(cat=>buildSectionHTML(cat,items)).join("");
    content.appendChild(col);
  });

}

async function loadSheet(){

  const response = await fetch(SHEET_CSV_URL);

  const csv = await response.text();

  const items = csvToObjects(csv);

  renderPage(items);

}

loadSheet();

</script>

</body>
</html>
