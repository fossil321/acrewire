<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AcreWire</title>

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  max-width:1800px;
  margin:10px auto;
  padding:0 20px;
  background:#fff;
  color:#000;
}

/* HEADER */

header{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
  text-align:center;
}

.masthead{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ACREWIRE TITLE */

.brand{
  font-size:56px;
  font-weight:900;
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:6px;
  background:linear-gradient(90deg,#1f4e2c,#3b7a3b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SUBTITLE */

.tagline{
  font-size:15px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:14px;
  color:#555;
  font-weight:700;
}

.tagline::before,
.tagline::after{
  content:"";
  display:inline-block;
  width:35px;
  height:2px;
  background:#3b7a3b;
  margin:0 10px;
  vertical-align:middle;
}

/* TOP STORY */

.top-story{
  width:100%;
  text-align:center;
  margin:12px 0 44px 0;
  min-height:28px;
}

.top-story a{
  text-decoration:underline;
}

.top-story a,
.top-story span{
  font-size:38px;
  font-weight:900;
  color:#000;
  line-height:1.08;
  letter-spacing:-0.4px;
  overflow-wrap:break-word;
  display:inline-block;
  max-width:1100px;
}

.top-story a:hover{
  text-decoration:underline;
}

.top-story .story-image{
  width:100%;
  max-width:calc((100% / 3) * 1.3);
  height:auto;
  display:block;
  margin:0 auto 14px auto;
  border-radius:4px;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:0;
  width:100%;
}

.column{
  border-right:1px solid #ccc;
  padding:0 18px;
  box-sizing:border-box;
}

.column:last-child{
  border-right:none;
}

.section{
  margin-bottom:20px;
}

/* CATEGORY HEADINGS */

.section-title{
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
  padding-bottom:4px;
  color:#1f4e2c;
  border-bottom:2px solid #3b7a3b;
  letter-spacing:1px;
}

.section-title:hover{
  color:#2e6a38;
}

.section ul{
  list-style:none;
  padding:0;
  margin:0;
}

/* LINKS */

.section li{
  margin:0 0 10px 0;
  line-height:1.28;
  font-size:14px;
  font-weight:700;
  overflow-wrap:break-word;
}

.section a{
  color:#000;
  text-decoration:none;
}

.section a:hover{
  text-decoration:underline;
}

/* STORY IMAGE */

.story-image{
  display:block;
  max-width:100%;
  width:100%;
  height:auto;
  margin:0 0 8px 0;
  border-radius:4px;
  object-fit:cover;
}

/* LOADING */

.loading{
  font-size:16px;
  color:#666;
}

.error{
  color:#b00020;
  font-weight:700;
  text-align:center;
  margin-top:20px;
}

/* RESPONSIVE */

@media (max-width:1100px){

  .grid{
    grid-template-columns:repeat(2, 1fr);
  }

  .column:nth-child(2){
    border-right:none;
  }

  .top-story .story-image{
    max-width:65%;
  }

  .top-story a,
  .top-story span{
    font-size:32px;
    max-width:900px;
  }

}

@media (max-width:700px){

  .grid{
    grid-template-columns:1fr;
  }

  .column{
    border-right:none !important;
    padding:0;
  }

  .brand{
    font-size:44px;
  }

  .top-story a,
  .top-story span{
    font-size:26px;
    line-height:1.12;
    max-width:100%;
  }

  .top-story .story-image{
    max-width:100%;
  }

  .section-title{
    font-size:17px;
  }

  .section li{
    font-size:14px;
    line-height:1.3;
  }

}

</style>
</head>
<body>

<header>
  <div class="masthead">

    <div class="brand">ACREWIRE</div>

    <div class="tagline">
      Land Agriculture Energy Markets
    </div>

  </div>
</header>

<div id="top-story" class="top-story"></div>

<div id="content" class="grid">
  <div class="loading">Loading...</div>
</div>

</body>
</html>
