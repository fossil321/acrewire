<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AcreWire</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  max-width:1800px;
  margin:10px auto;
  padding:0 20px;
  background:#fff;
  color:#000;
}

header{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
  text-align:center;
}

.masthead{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.brand{
  font-size:52px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:4px;
}

.tagline{
  font-size:15px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:12px;
}

.top-story{
  width:100%;
  text-align:center;
  margin:8px 0 18px 0;
  min-height:28px;
}

.top-story a,
.top-story span{
  font-size:28px;
  font-weight:800;
  text-decoration:none;
  color:#000;
  line-height:1.2;
}

.top-story a:hover{
  text-decoration:underline;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:18px;
  width:100%;
}

.column{
  border-top:2px solid #000;
  padding-top:8px;
}

.section{
  margin-bottom:18px;
}

.section-title{
  font-size:20px;
  font-weight:800;
  text-transform:uppercase;
  margin-bottom:8px;
  border-bottom:1px solid #bbb;
  padding-bottom:4px;
}

.section ul{
  list-style:none;
  padding:0;
  margin:0;
}

.section li{
  margin:0 0 8px 0;
  line-height:1.25;
  font-size:16px;
  font-weight:700;
}

.section a{
  color:#000;
  text-decoration:none;
}

.section a:hover{
  text-decoration:underline;
}

.loading{
  font-size:16px;
  color:#666;
}

.error{
  color:#b00020;
  font-weight:700;
  text-align:center;
  margin-top:20px;
}

@media (max-width:1100px){
  .grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media (max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }

  .brand{
    font-size:40px;
  }

  .top-story a,
  .top-story span{
    font-size:22px;
  }
}
</style>
</head>
<body>

<header>
  <div class="masthead">
    <div class="brand">ACREWIRE</div>
    <div class="tagline">AG NEWS, WATER, MARKETS, REAL ASSETS</div>
  </div>
</header>

<div id="top-story" class="top-story"></div>

<div id="content" class="grid">
  <div class="loading">Loading...</div>
</div>

<script>
/*
IMPORTANT:
Use the published CSV link from Google Sheets, not the normal share link.

It should look like:
https://docs.google.com/spreadsheets/d/e/XXXXXXXX/pub?gid=0&single=true&output=csv
*/
const SHEET_CSV_URL = "PASTE_YOUR_PUBLISHED_CSV_URL_HERE";

const categories = [
  "Top",
  "Row Crops",
  "Permanent Crops",
  "Global Agriculture",
  "Ag Policy",
  "Ag Technology",
  "Fertilizer & Chemicals",
  "Farmland",
  "Water",
  "Commodities",
  "Markets",
  "Residential Real Estate",
  "Commercial Real Estate",
  "Land & Development",
  "Energy",
  "Renewable Energy",
  "Infrastructure",
  "Real Asset Investing"
];

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === "," && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && next === "\n") i++;
      row.push(cell);
      rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }

  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function cleanText(value) {
  return String(value || "")
    .replace(/^\uFEFF/, "")   // remove BOM
    .replace(/\u00A0/g, " ")  // replace non-breaking spaces
    .trim();
}

function normalizeSection(value) {
  return cleanText(value).toLowerCase();
}

function csvToObjects(csvText) {
  const rows = parseCSV(csvText).filter(r => r.some(cell => cleanText(cell) !== ""));
  if (!rows.length) return [];

  const headers = rows[0].map(h => cleanText(h).toLowerCase());

  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((header, i) => {
      obj[header] = cleanText(row[i] || "");
    });
    return obj;
  });
}

function isValidUrl(url) {
  const value = cleanText(url);
  return /^https?:\/\//i.test(value);
}

function sortByRank(items) {
  return [...items].sort((a, b) => {
    const rankA = Number(a.rank);
    const rankB = Number(b.rank);
    const safeA = Number.isFinite(rankA) ? rankA : 9999;
    const safeB = Number.isFinite(rankB) ? rankB : 9999;
    return safeA - safeB;
  });
}

function getItemsForSection(allItems, sectionName) {
  return sortByRank(
    allItems.filter(item =>
      normalizeSection(item.section) === normalizeSection(sectionName) &&
      cleanText(item.headline) !== ""
    )
  );
}

function renderTopStory(items) {
  const topContainer = document.getElementById("top-story");
  const topItems = getItemsForSection(items, "Top");

  if (!topItems.length) {
    topContainer.innerHTML = "";
    return;
  }

  const top = topItems[0];
  const headline = cleanText(top.headline);
  const url = cleanText(top.url);

  if (isValidUrl(url)) {
    topContainer.innerHTML = `<a href="${url}" target="_blank" rel="noopener noreferrer">${headline}</a>`;
  } else {
    topContainer.innerHTML = `<span>${headline}</span>`;
  }
}

function buildSectionHTML(title, items) {
  const sectionItems = getItemsForSection(items, title);

  let html = `
    <div class="section">
      <div class="section-title">${title}</div>
      <ul>
  `;

  if (!sectionItems.length) {
    html += `<li>&nbsp;</li>`;
  } else {
    sectionItems.forEach(item => {
      const headline = cleanText(item.headline);
      const url = cleanText(item.url);

      if (isValidUrl(url)) {
        html += `<li><a href="${url}" target="_blank" rel="noopener noreferrer">${headline}</a></li>`;
      } else {
        html += `<li>${headline}</li>`;
      }
    });
  }

  html += `
      </ul>
    </div>
  `;
  return html;
}

function chunkIntoColumns(arr, numberOfColumns) {
  const columns = Array.from({ length: numberOfColumns }, () => []);
  arr.forEach((item, index) => {
    columns[index % numberOfColumns].push(item);
  });
  return columns;
}

function renderPage(items) {
  renderTopStory(items);

  const nonTopCategories = categories.filter(cat => cat !== "Top");
  const columnGroups = chunkIntoColumns(nonTopCategories, 3);

  const content = document.getElementById("content");
  content.innerHTML = "";

  columnGroups.forEach(group => {
    const col = document.createElement("div");
    col.className = "column";
    col.innerHTML = group.map(cat => buildSectionHTML(cat, items)).join("");
    content.appendChild(col);
  });
}

async function loadSheetData() {
  try {
    const response = await fetch(SHEET_CSV_URL, {
      method: "GET",
      cache: "no-store"
    });

    if (!response.ok) {
      throw new Error("Could not load published CSV");
    }

    const csvText = await response.text();
    const items = csvToObjects(csvText);

    console.log("Loaded items:", items);

    renderPage(items);
  } catch (err) {
    console.error("Sheet load error:", err);
    document.getElementById("top-story").innerHTML = "";
    document.getElementById("content").innerHTML = `
      <div class="error">Unable to load stories right now.</div>
    `;
  }
}

loadSheetData();
</script>

</body>
</html>
