<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AcreWire</title>

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  max-width:1800px;
  margin:10px auto;
  padding:0 20px;
  background:#fff;
  color:#000;
}

header{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
  text-align:center;
}

.masthead{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.brand{
  font-size:52px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:4px;
}

.tagline{
  font-size:15px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:12px;
}

/* TOP STORY */

.top-story{
  width:100%;
  text-align:center;
  margin:8px 0 18px 0;
  min-height:28px;
}

.top-story a,
.top-story span{
  font-size:28px;
  font-weight:800;
  text-decoration:none;
  color:#000;
  line-height:1.2;
}

.top-story a:hover{
  text-decoration:underline;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:18px;
  width:100%;
}

.column{
  border-top:2px solid #000;
  padding-top:8px;
}

.section{
  margin-bottom:18px;
}

.section-title{
  font-size:20px;
  font-weight:800;
  text-transform:uppercase;
  margin-bottom:8px;
  border-bottom:1px solid #bbb;
  padding-bottom:4px;
}

.section ul{
  list-style:none;
  padding:0;
  margin:0;
}

/* UPDATED LINK STYLE */

.section li{
  margin:0 0 12px 0;
  line-height:1.3;
  font-size:15px;
  font-weight:700;
}

.section a{
  color:#000;
  text-decoration:none;
}

.section a:hover{
  text-decoration:underline;
}

.loading{
  font-size:16px;
  color:#666;
}

.error{
  color:#b00020;
  font-weight:700;
  text-align:center;
  margin-top:20px;
}

/* RESPONSIVE */

@media (max-width:1100px){

  .grid{
    grid-template-columns:repeat(2, 1fr);
  }

}

@media (max-width:700px){

  .grid{
    grid-template-columns:1fr;
  }

  .brand{
    font-size:40px;
  }

  .top-story a,
  .top-story span{
    font-size:22px;
  }

}

</style>
</head>
<body>

<header>

<div class="masthead">

<div class="brand">ACREWIRE</div>

<div class="tagline">
Land • Agriculture • Energy • Markets
</div>

</div>

</header>

<div id="top-story" class="top-story"></div>

<div id="content" class="grid">

<div class="loading">Loading...</div>

</div>

<script>

const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-3xml3CAOrMcVTmr4tkQ5R1gjsnxd2fuRh2u8I0ucXHLdcjMHzs43Jxmu-mcGXGv6qTMA6mar_7Qm/pub?output=csv";

const categories = [

"Top",
"Row Crops",
"Permanent Crops",
"Global Agriculture",
"Ag Policy",
"Ag Technology",
"Fertilizer & Chemicals",
"Farmland",
"Water",
"Commodities",
"Markets",
"Residential Real Estate",
"Commercial Real Estate",
"Land & Development",
"Energy",
"Renewable Energy",
"Infrastructure",
"Real Asset Investing"

];

function parseCSV(text){

const rows=[];
const lines=text.split("\n");

for(let line of lines){

rows.push(line.split(","));

}

return rows;

}

function csvToObjects(csvText){

const rows=parseCSV(csvText);

const items=[];

for(let i=1;i<rows.length;i++){

const row=rows[i];

if(!row || row.length<4) continue;

items.push({

section:row[0].trim(),
rank:row[1].trim(),
headline:row[2].trim(),
url:row[3].trim()

});

}

return items;

}

function sortByRank(items){

return items.sort((a,b)=>Number(a.rank)-Number(b.rank));

}

function renderTopStory(items){

const top = items
.filter(x=>x.section==="Top")
.sort((a,b)=>Number(a.rank)-Number(b.rank))[0];

if(!top) return;

const el=document.getElementById("top-story");

el.innerHTML=`<a href="${top.url}" target="_blank">${top.headline}</a>`;

}

function buildSectionHTML(title,items){

const sectionItems=sortByRank(items.filter(x=>x.section===title));

let html=`
<div class="section">
<div class="section-title">${title}</div>
<ul>
`;

for(let item of sectionItems){

html+=`<li><a href="${item.url}" target="_blank">${item.headline}</a></li>`;

}

html+=`
</ul>
</div>
`;

return html;

}

function chunkIntoColumns(arr,num){

const cols=Array.from({length:num},()=>[]);

arr.forEach((item,i)=>cols[i%num].push(item));

return cols;

}

function renderPage(items){

renderTopStory(items);

const sections=categories.filter(x=>x!=="Top");

const columns=chunkIntoColumns(sections,3);

const content=document.getElementById("content");

content.innerHTML="";

columns.forEach(group=>{

const col=document.createElement("div");

col.className="column";

col.innerHTML=group.map(cat=>buildSectionHTML(cat,items)).join("");

content.appendChild(col);

});

}

async function loadSheet(){

const response=await fetch(SHEET_CSV_URL);

const csv=await response.text();

const items=csvToObjects(csv);

renderPage(items);

}

loadSheet();

</script>

</body>
</html>
