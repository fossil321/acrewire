<!DOCTYPE html>
<html>
<head>
  <title>AcreWire</title>
  <style>
  body { font-family: Arial, Helvetica, sans-serif; max-width: 980px; margin: 16px auto; padding: 0 10px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  h1 { margin: 0; font-size: 34px; letter-spacing: 0.5px; }
  .updated { font-size: 12px; color: #555; }
  .grid { display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 18px; }
  h3 { margin: 10px 0 6px; font-size: 12px; letter-spacing: 1px; }
  .item { margin: 6px 0; line-height: 1.15; }
  a { text-decoration: none; color: #000; }
  a:hover { text-decoration: underline; }
  .red { color: red; font-weight: 700; }
  .bold { font-weight: 700; }
  .source { font-size: 11px; color: #666; }
  .tag { font-size: 11px; color: #666; margin-right: 4px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<h1>Acrewire</h1>

<div id="content" class="grid"></div>

<script>
fetch("./data/links.json?v=" + Date.now(), { cache: "no-store" })
  .then(res => res.json())
  .then(data => {
    const content = document.getElementById("content");

    Object.keys(data).forEach(section => {
      const div = document.createElement("div");

      div.innerHTML =
        `<h3>${section.toUpperCase()}</h3>` +
        data[section].map(item => `
          <div>
            <a href="${item.url}" target="_blank" class="${item.style || ""}">
              ${item.title}
            </a>
            <span class="source"> — ${item.source || ""}</span>
          </div>
        `).join("");

      content.appendChild(div);
    });
  });
</script>

</body>
</html>
