<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AcreWire</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  max-width: 1800px;
  margin: 10px auto;
  padding: 0 30px;
  color:#111;
  background:#fff;
}

a{
  color:#111;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

/* MASTHEAD */

header{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
  text-align:center;
}

.masthead{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.brand{
  font-size:56px;
  font-weight:900;
  letter-spacing:3px;
  text-transform:uppercase;
  line-height:1;
  margin-bottom:6px;
}

.brand a{
  color:#111;
  text-decoration:none;
}

.tagline{
  font-size:16px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:#555;
  margin-bottom:10px;
}

.rule{
  width:100%;
  border-top:3px solid #111;
  border-bottom:1px solid #111;
  height:5px;
  margin:8px 0 18px 0;
}

/* TOP SECTION */

.top-wrap{
  display:grid;
  grid-template-columns: 1fr minmax(420px, 720px) 1fr;
  gap:30px;
  align-items:start;
  margin-bottom:38px;
}

.top-left,
.top-right{
  min-height:20px;
}

.top-center{
  display:flex;
  justify-content:center;
}

.top-story{
  width:100%;
  text-align:center;
  margin-bottom:42px;
}

.top-story-image-wrap{
  display:flex;
  justify-content:center;
  margin:0 auto 14px auto;
  overflow:visible;
}

.top-story img{
  display:block;
  width:108%;
  max-width:780px;
  height:auto;
  object-fit:cover;
  margin:0 auto;
}

.top-story h1{
  font-size:34px;
  line-height:1.15;
  margin:0 0 10px 0;
  font-weight:800;
}

.top-story h1 a{
  color:#111;
  text-decoration:none;
}

.top-story h1 a:hover{
  text-decoration:underline;
}

/* CATEGORY GRID */

.sections{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:34px;
  align-items:start;
}

.section{
  border-top:4px solid #111;
  padding-top:10px;
}

.section-title{
  font-size:22px;
  font-weight:800;
  margin:0 0 14px 0;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.story{
  margin-bottom:18px;
}

.story-image-wrap{
  width:100%;
  margin:0 0 8px 0;
  overflow:hidden;
}

.story img{
  display:block;
  width:100%;
  max-width:100%;
  height:auto;
  object-fit:cover;
}

.story a{
  font-size:17px;
  line-height:1.35;
  font-weight:700;
}

.loading,
.error,
.empty{
  font-size:18px;
  color:#555;
  text-align:center;
  padding:20px 0;
}

/* RESPONSIVE */

@media (max-width: 1200px){
  .sections{
    grid-template-columns: repeat(2, 1fr);
  }

  .top-wrap{
    grid-template-columns: 1fr;
    gap:20px;
  }

  .top-center{
    order:1;
  }

  .top-left{
    order:2;
  }

  .top-right{
    order:3;
  }

  .top-story img{
    width:100%;
    max-width:100%;
  }
}

@media (max-width: 700px){
  body{
    padding:0 16px;
  }

  .brand{
    font-size:40px;
  }

  .top-story h1{
    font-size:28px;
  }

  .sections{
    grid-template-columns: 1fr;
  }

  .section-title{
    font-size:20px;
  }
}
</style>
</head>
<body>

<header>
  <div class="masthead">
    <div class="brand"><a href="#">ACREWIRE</a></div>
    <div class="tagline">Land Agriculture Energy Markets</div>
  </div>
</header>

<div class="rule"></div>

<div id="app">
  <div class="loading">Loading...</div>
</div>

<script>
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR-3xml3CAOrMcVTmr4tkQ5R1gjsnxd2fuRh2u8I0ucXHLdcjMHzs43Jxmu-mcGXGv6qTMA6mar_7Qm/pub?output=csv';

const categoryOrder = [
  'Row Crops',
  'Almonds',
  'Pistachios',
  'Dairy',
  'Cattle',
  'Water',
  'Energy',
  'Markets',
  'Policy',
  'Land',
  'Weather',
  'International'
];

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const nextChar = text[i + 1];

    if(char === '"'){
      if(inQuotes && nextChar === '"'){
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if(char === ',' && !inQuotes){
      row.push(cell);
      cell = '';
    } else if((char === '\n' || char === '\r') && !inQuotes){
      if(char === '\r' && nextChar === '\n') i++;
      row.push(cell);
      if(row.some(v => v.trim() !== '')) rows.push(row);
      row = [];
      cell = '';
    } else {
      cell += char;
    }
  }

  if(cell.length > 0 || row.length > 0){
    row.push(cell);
    if(row.some(v => v.trim() !== '')) rows.push(row);
  }

  if(!rows.length) return [];

  const headers = rows[0].map(h => h.trim().toLowerCase());
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, idx) => {
      obj[h] = (r[idx] || '').trim();
    });
    return obj;
  });
}

function normalizeSection(section){
  return (section || '').trim();
}

function sortStories(stories){
  return stories.sort((a, b) => {
    const rankA = parseInt(a.rank || '999', 10);
    const rankB = parseInt(b.rank || '999', 10);
    return rankA - rankB;
  });
}

function storyHTML(story, isTop = false){
  const hasImage = story.image_url && story.image_url.trim() !== '';
  const safeHeadline = escapeHTML(story.headline || '');
  const safeURL = escapeAttr(story.url || '#');
  const safeImage = escapeAttr(story.image_url || '');

  if(isTop){
    return `
      <article class="top-story">
        ${hasImage ? `
          <div class="top-story-image-wrap">
            <img src="${safeImage}" alt="${safeHeadline}" loading="lazy">
          </div>
        ` : ''}
        <h1><a href="${safeURL}" target="_blank" rel="noopener noreferrer">${safeHeadline}</a></h1>
      </article>
    `;
  }

  return `
    <article class="story">
      ${hasImage ? `
        <div class="story-image-wrap">
          <img src="${safeImage}" alt="${safeHeadline}" loading="lazy">
        </div>
      ` : ''}
      <a href="${safeURL}" target="_blank" rel="noopener noreferrer">${safeHeadline}</a>
    </article>
  `;
}

function escapeHTML(str){
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function escapeAttr(str){
  return escapeHTML(str);
}

function buildPage(data){
  const app = document.getElementById('app');

  if(!data.length){
    app.innerHTML = '<div class="empty">No stories found.</div>';
    return;
  }

  const grouped = {};
  data.forEach(item => {
    const section = normalizeSection(item.section);
    if(!section) return;
    if(!grouped[section]) grouped[section] = [];
    grouped[section].push(item);
  });

  Object.keys(grouped).forEach(section => {
    grouped[section] = sortStories(grouped[section]);
  });

  const topStories = grouped['Top'] || [];

  const orderedSections = [
    ...categoryOrder.filter(name => grouped[name]),
    ...Object.keys(grouped).filter(name => name !== 'Top' && !categoryOrder.includes(name))
  ];

  const topHTML = `
    <div class="top-wrap">
      <div class="top-left"></div>
      <div class="top-center">
        ${topStories.length ? storyHTML(topStories[0], true) : ''}
      </div>
      <div class="top-right"></div>
    </div>
  `;

  const sectionsHTML = orderedSections.map(sectionName => {
    const stories = grouped[sectionName] || [];
    return `
      <section class="section">
        <h2 class="section-title">${escapeHTML(sectionName)}</h2>
        ${stories.map(story => storyHTML(story, false)).join('')}
      </section>
    `;
  }).join('');

  app.innerHTML = `
    ${topHTML}
    <div class="sections">
      ${sectionsHTML}
    </div>
  `;
}

async function loadSheet(){
  const app = document.getElementById('app');

  try{
    const response = await fetch(SHEET_CSV_URL, { cache: 'no-store' });
    if(!response.ok) throw new Error('Could not load sheet.');
    const csvText = await response.text();
    const data = parseCSV(csvText);
    buildPage(data);
  } catch(error){
    app.innerHTML = '<div class="error">Could not load stories. Check your published Google Sheet CSV link.</div>';
    console.error(error);
  }
}

loadSheet();
</script>

</body>
</html>
