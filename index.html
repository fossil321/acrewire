<!doctype html>
<html>

<title>AcreWire</title>

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  max-width:1800px;
  margin:10px auto;
  padding:0 20px;
  background:#fff;
  color:#000;
}

/* HEADER */

header{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
  text-align:center;
}

.masthead{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ACREWIRE TITLE */

.brand{
  font-size:56px;
  font-weight:900;
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:6px;
}

.tagline{
  font-size:14px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#555;
  margin-bottom:10px;
}

/* LINKS */

a{
  color:#000;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

/* SECTION */

.section{
  margin-top:30px;
}

.section-title{
  font-size:20px;
  font-weight:700;
  border-bottom:2px solid #000;
  padding-bottom:6px;
  margin-bottom:12px;
}

.item{
  margin-bottom:10px;
  font-size:16px;
}

.footer{
  margin-top:40px;
  padding-top:10px;
  border-top:1px solid #ccc;
  font-size:13px;
  text-align:center;
  color:#555;
}

</style>
</head>

<body>

<header>
  <div class="masthead">

</div>

<div class="section">
